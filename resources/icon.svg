<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#e0eaff;stop-opacity:0.85"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>
  <!-- Hexagon shape -->
  <polygon
    points="128,28 214,76 214,180 128,228 42,180 42,76"
    fill="url(#hex)"
    filter="url(#shadow)"
    opacity="0.95"
  />
  <!-- Inner arrow / drop icon -->
  <g transform="translate(128,128)">
    <!-- Down arrow shaft -->
    <rect x="-8" y="-38" width="16" height="48" rx="8" fill="url(#arrow)"/>
    <!-- Arrowhead -->
    <polygon points="-24,14 0,42 24,14" fill="url(#arrow)"/>
    <!-- Base line -->
    <rect x="-30" y="50" width="60" height="10" rx="5" fill="url(#arrow)" opacity="0.7"/>
  </g>
</svg>
